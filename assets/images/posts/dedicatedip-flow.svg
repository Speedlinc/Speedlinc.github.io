<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="1000" height="320" rx="18" fill="#0e1830" stroke="#2a3a5e" stroke-opacity="0.6"/>
  <text x="40" y="56" fill="#dce6ff" font-size="26" font-weight="800">共享出口 IP 的连带风险</text>
  <text x="40" y="88" fill="#8ea4ca" font-size="17">一群人挤在同一个出口，有人出事大家被连累</text>
  <g>
    <rect x="40" y="150" width="240" height="92" rx="14" fill="#16223e" stroke="#9fb3d6" stroke-opacity="0.4"/>
    <text x="160" y="196" text-anchor="middle" fill="#e6eeff" font-size="20" font-weight="700">多人共用</text>
    <text x="160" y="222" text-anchor="middle" fill="#9fb3d6" font-size="17">同一出口 IP</text>
    <rect x="380" y="150" width="240" height="92" rx="14" fill="#241a1a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="500" y="196" text-anchor="middle" fill="#ffd7d7" font-size="20" font-weight="700">有人触发风控</text>
    <text x="500" y="222" text-anchor="middle" fill="#ff9b9b" font-size="17">出口被标记</text>
    <rect x="720" y="150" width="240" height="92" rx="14" fill="#241a1a" stroke="#ff6b6b" stroke-opacity="0.7"/>
    <text x="840" y="196" text-anchor="middle" fill="#ffe0e0" font-size="20" font-weight="700">连累到你</text>
    <text x="840" y="222" text-anchor="middle" fill="#ff9b9b" font-size="17">频繁验证 · 限制</text>
  </g>
  <g stroke="#ff8a8a" stroke-width="2.5" fill="#ff8a8a" stroke-opacity="0.8">
    <line x1="284" y1="196" x2="372" y2="196"/><path d="M372 196 l-12 -6 v12 z"/>
    <line x1="624" y1="196" x2="712" y2="196"/><path d="M712 196 l-12 -6 v12 z"/>
  </g>
</svg>
