  <g>
    <rect x="300" y="118" width="150" height="160" rx="10" fill="#ff6b6b" fill-opacity="0.85"/>
    <text x="375" y="148" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="800">7%</text>
    <text x="375" y="304" text-anchor="middle" fill="#9fb3d6" font-size="18">默认线路</text>
